spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/simplemq
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  otlp:
    metrics:
      export:
        url: ${OTLP_ENDPOINT}/v1/metrics
        headers:
          Authorization: Basic ${OTLP_AUTH}
        histogram-flavor: EXPLICIT_BUCKET_HISTOGRAM
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1000ms, 2000ms
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    com.simplemq: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG