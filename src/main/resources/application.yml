spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/simplemq
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.simplemq: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
