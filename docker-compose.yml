services:
  postgres:
    image: postgres:16
    container_name: simple-mq-postgres
    # Tuned for GCP e2-micro (1GB RAM). Postgres defaults are sized for much larger machines.
    # JVM heap: 384MB, HikariCP pool: 6 — max_connections ceiling set accordingly.
    # shared_buffers kept low to preserve OS page cache headroom for JVM working set.
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=512MB
      -c max_connections=20
    environment:
      POSTGRES_DB: simplemq
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d simplemq"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: nathanzk/simple-mq:latest
    container_name: simple-mq-app
    mem_limit: 600m
    entrypoint: ["java", "-Xms384m", "-Xmx384m", "-XX:MaxMetaspaceSize=128m", "-jar", "app.jar"]
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/simplemq
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT}
      OTLP_AUTH: ${OTLP_AUTH}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
